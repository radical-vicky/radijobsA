<!DOCTYPE html>
<html lang="en" class="html-auth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RadiloxRemoteJobs{% endblock %}</title>
    
    <style>
        :root {
            --color-canvas-default: #0d1117;
            --color-canvas-subtle: #161b22;
            --color-border-default: #30363d;
            --color-border-muted: #21262d;
            --color-fg-default: #e6edf3;
            --color-fg-muted: #8b949e;
            --color-accent-fg: #2f81f7;
            --color-accent-emphasis: #1f6feb;
            --color-danger-fg: #f85149;
            --color-success-fg: #3fb950;
            --color-attention-fg: #d29922;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--color-canvas-default);
            color: var(--color-fg-default);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
            line-height: 1.5;
        }
        
        /* Authentication container */
        .auth-container {
            max-width: 308px;
            margin: 0 auto;
            padding: 32px 16px;
        }
        
        /* Logo */
        .auth-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        
        /* Form card - NO BORDER, just background */
        .auth-form {
            background-color: var(--color-canvas-subtle);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        /* Headings */
        .auth-heading {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .auth-subheading {
            font-size: 12px;
            color: var(--color-fg-muted);
            text-align: center;
            margin-bottom: 20px;
        }
        
        .auth-create-account {
            font-size: 12px;
            color: var(--color-fg-muted);
            text-align: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border-muted);
        }
        
        /* Form fields */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-control {
            background-color: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
            border-radius: 6px;
            color: var(--color-fg-default);
            font-size: 14px;
            line-height: 20px;
            padding: 5px 12px;
            width: 100%;
        }
        
        .form-control:focus {
            border-color: var(--color-accent-fg);
            outline: none;
            box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3);
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .position-relative {
            position: relative;
        }
        
        .label-link {
            font-size: 12px;
            position: absolute;
            right: 0;
            top: 0;
        }
        
        .error-message {
            color: var(--color-danger-fg);
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Buttons */
        .btn {
            background-color: var(--color-accent-emphasis);
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            padding: 5px 16px;
            width: 100%;
        }
        
        .btn:hover {
            background-color: #1b5fc9;
        }
        
        /* Flash messages */
        .flash {
            border-radius: 6px;
            margin-bottom: 16px;
            padding: 16px;
            position: relative;
        }
        
        .flash-full {
            background-color: var(--color-canvas-default);
            border: 1px solid var(--color-border-default);
        }
        
        .flash-error {
            background-color: rgba(248, 81, 73, 0.1);
            border-color: var(--color-danger-fg);
            color: var(--color-danger-fg);
        }
        
        .flash-close {
            background: none;
            border: 0;
            cursor: pointer;
            float: right;
            padding: 0;
        }
        
        /* Footer links */
        .auth-footer {
            text-align: center;
            font-size: 12px;
            margin-top: 16px;
        }
        
        a {
            color: var(--color-accent-fg);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        .session-authentication-footer {
            border-top: 1px solid var(--color-border-muted);
            margin-top: 40px;
            padding: 24px;
            text-align: center;
        }
        
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            list-style: none;
        }
        
        .Link--secondary {
            color: var(--color-fg-muted);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        {% block content %}{% endblock %}
    </div>
    
    <div class="session-authentication-footer">
        <ul class="footer-links">
            <li><a href="{% url 'home:terms' %}" class="Link--secondary">Terms</a></li>
            <li><a href="{% url 'home:privacy' %}" class="Link--secondary">Privacy</a></li>
            <li><a href="{% url 'home:contact' %}" class="Link--secondary">Contact</a></li>
        </ul>
    </div>
</body>
</html>
