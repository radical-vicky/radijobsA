{% if messages %}
<div class="fixed top-20 right-4 z-50 space-y-2 max-w-md" x-data="{ show: true }" x-init="setTimeout(() => show = false, 5000)">
    {% for message in messages %}
        <div x-show="show" x-transition:enter="transform ease-out duration-300 transition" 
             x-transition:enter-start="translate-x-full opacity-0" 
             x-transition:enter-end="translate-x-0 opacity-100"
             x-transition:leave="transform ease-in duration-300 transition"
             x-transition:leave-start="translate-x-0 opacity-100"
             x-transition:leave-end="translate-x-full opacity-0"
             class="p-4 rounded-lg shadow-lg {% if message.tags == 'success' %}bg-green-500 text-white{% elif message.tags == 'error' %}bg-red-500 text-white{% elif message.tags == 'warning' %}bg-yellow-500 text-white{% else %}bg-blue-500 text-white{% endif %}">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    {% if message.tags == 'success' %}
                        <i class="fas fa-check-circle mr-2"></i>
                    {% elif message.tags == 'error' %}
                        <i class="fas fa-exclamation-circle mr-2"></i>
                    {% elif message.tags == 'warning' %}
                        <i class="fas fa-exclamation-triangle mr-2"></i>
                    {% else %}
                        <i class="fas fa-info-circle mr-2"></i>
                    {% endif %}
                    <span>{{ message }}</span>
                </div>
                <button @click="show = false" class="ml-4 text-white hover:text-gray-200">&times;</button>
            </div>
        </div>
    {% endfor %}
</div>
{% endif %}
